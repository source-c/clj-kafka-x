version: 2.1

jobs:
  build:
    docker:
      - image: cimg/clojure:1.12.0
    working_directory: ~/project
    environment:
      MIDJE_COLORIZE: "NONE"
      LEIN_ROOT: "true"
      JVM_OPTS: -Xmx3200m
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "project.clj" }}-{{ checksum "profiles.clj" }}
            - v1-deps-
      - run:
          name: Install dependencies
          command: lein with-profile +dev,+provided deps
      - save_cache:
          key: v1-deps-{{ checksum "project.clj" }}-{{ checksum "profiles.clj" }}
          paths:
            - ~/.m2
            - ~/.lein
      - run:
          name: Clean
          command: lein clean
      - run:
          name: Run tests
          command: lein with-profile +dev,+provided test
      - run:
          name: Build JAR
          command: lein with-profile +provided,+jar jar

workflows:
  build-and-test:
    jobs:
      - build
